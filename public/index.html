<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VAX Messenger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap');
:root{--bg:#050810;--panel:#080d1a;--card:#0c1428;--hover:#111e3a;--accent:#00e5ff;--accent2:#7b2fff;--accent3:#ff2d78;--green:#00ff88;--text:#e8f0ff;--muted:#4a6080;--dim:#2a3a55;--border:#1a2a45}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px 44px;width:340px;display:flex;flex-direction:column;gap:20px;box-shadow:0 0 60px rgba(0,229,255,.07)}
.login-logo{font-family:'Rajdhani',sans-serif;font-size:48px;font-weight:700;letter-spacing:14px;color:var(--accent);text-shadow:0 0 30px rgba(0,229,255,.5);text-align:center}
.login-logo span{color:var(--accent3)}
.login-sub{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--dim);text-align:center;margin-top:-12px}
.login-label{font-size:11px;letter-spacing:2px;color:var(--muted);font-family:'Share Tech Mono',monospace;text-transform:uppercase;margin-bottom:7px}
.login-input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:15px;outline:none;width:100%;transition:border-color .2s}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,229,255,.1)}
.login-btn{background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:8px;padding:13px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .15s}
.login-btn:active{transform:scale(.98)}

/* TOPBAR */
.topbar{display:flex;align-items:center;padding:0 16px;height:52px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;gap:10px}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4}
.menu-btn{background:none;border:none;color:var(--accent);font-size:20px;cursor:pointer;padding:4px;display:none}
.logo{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;letter-spacing:8px;color:var(--accent);text-shadow:0 0 20px rgba(0,229,255,.5)}
.logo span{color:var(--accent3)}
.conn-badge{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:3px 8px;border-radius:4px;border:1px solid var(--dim);color:var(--dim)}
.conn-badge.ok{color:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(0,255,136,.2)}
.conn-badge.err{color:var(--accent3);border-color:var(--accent3)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.my-name{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted)}
.my-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:#fff;border:1px solid rgba(255,255,255,.15)}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50}

/* SIDEBAR */
.sidebar{width:240px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sec-label{padding:10px 14px 5px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--dim)}
.room-list{display:flex;flex-direction:column;gap:1px;padding:0 6px}
.room-item{display:flex;align-items:center;gap:6px;padding:8px 8px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .15s;font-size:13px;color:var(--muted);position:relative}
.room-item:hover{background:var(--hover);color:var(--text)}
.room-item:hover .room-actions{display:flex}
.room-item.active{background:var(--card);border-color:var(--border);color:var(--accent)}
.room-hash{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--dim);flex-shrink:0}
.room-item.active .room-hash{color:var(--accent)}
.room-name-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.room-count{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)}
.room-actions{display:none;gap:2px;margin-left:auto}
.room-action-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:2px 4px;border-radius:3px;transition:color .1s}
.room-action-btn:hover{color:var(--text)}
.room-action-btn.del:hover{color:var(--accent3)}
.new-room-btn{margin:6px 8px;padding:7px 10px;background:none;border:1px dashed var(--border);border-radius:7px;color:var(--dim);font-size:12px;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all .15s;text-align:left}
.new-room-btn:hover{border-color:var(--accent2);color:var(--accent2)}

/* MEMBERS / DM LIST */
.sec-label-members{padding:10px 14px 5px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--dim);border-top:1px solid var(--border);margin-top:4px}
.member-list{flex:1;overflow-y:auto;padding:0 6px 8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.member-item{display:flex;align-items:center;gap:8px;padding:6px 6px;border-radius:6px;cursor:pointer;transition:background .15s}
.member-item:hover{background:var(--hover)}
.member-item.active-dm{background:var(--card);border:1px solid var(--border)}
.m-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;color:#fff;flex-shrink:0;position:relative}
.m-avatar::after{content:'';position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);border:1.5px solid var(--panel)}
.m-name{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-name.me-label{color:var(--text)}
.dm-unread{width:16px;height:16px;border-radius:50%;background:var(--accent3);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:auto;font-family:'Rajdhani',sans-serif;box-shadow:0 0 6px rgba(255,45,120,.5)}

/* CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);background-image:radial-gradient(ellipse at 20% 50%,rgba(123,47,255,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,229,255,.04) 0%,transparent 50%)}
.chat-header{display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--panel);gap:10px;flex-shrink:0;min-height:52px}
.ch-icon{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--accent);text-shadow:0 0 10px rgba(0,229,255,.4)}
.ch-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px}
.ch-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);margin-left:4px}
.ch-count{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green);margin-left:auto;display:flex;align-items:center;gap:5px}
.ch-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* DM HEADER */
.dm-badge{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:2px 8px;border-radius:4px;background:rgba(255,45,120,.15);border:1px solid rgba(255,45,120,.4);color:var(--accent3)}

.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:3px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.date-div{display:flex;align-items:center;gap:10px;margin:10px 0 6px}
.date-div::before,.date-div::after{content:'';flex:1;height:1px;background:var(--border)}
.date-div span{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:2px}

.msg-row{display:flex;gap:8px;padding:2px 0;align-items:flex-start}
.msg-row.continuation{padding-left:40px}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;color:#fff;flex-shrink:0;margin-top:2px}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.msg-name{font-size:13px;font-weight:600}
.msg-time{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)}
.msg-text{font-size:14px;line-height:1.55;color:var(--text);word-break:break-word}
.msg-text.mine{color:#c8dfff}
.msg-img{max-width:280px;max-height:320px;border-radius:10px;border:1px solid var(--border);margin-top:4px;cursor:pointer;display:block;transition:opacity .15s}
.msg-img:hover{opacity:.9}

.typing-bar{padding:6px 20px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);min-height:24px;display:flex;align-items:center;gap:6px}
.t-dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite;margin-right:2px}
.t-dots span:nth-child(2){animation-delay:.2s}
.t-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* INPUT */
.input-area{padding:10px 16px 14px;border-top:1px solid var(--border);background:var(--panel);display:flex;gap:8px;flex-shrink:0;align-items:flex-end}
.input-wrap{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;padding:0 12px;gap:6px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,229,255,.08)}
.msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;padding:11px 0;resize:none;max-height:120px;line-height:1.5}
.msg-input::placeholder{color:var(--dim)}
.attach-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;transition:color .15s;flex-shrink:0;line-height:1}
.attach-btn:hover{color:var(--accent)}
.send-btn{width:40px;height:40px;border-radius:9px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:active{transform:scale(.95)}
#fileInput{display:none}

/* IMAGE LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:none;align-items:center;justify-content:center;cursor:pointer}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:8px;object-fit:contain}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:10px 16px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text);z-index:9998;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:300}
.modal.open{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:26px;width:300px;display:flex;flex-direction:column;gap:14px}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;color:var(--accent)}
.modal-title.danger{color:var(--accent3)}
.modal-text{font-size:13px;color:var(--muted);line-height:1.5}
.modal-input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;width:100%}
.modal-input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:10px;border-radius:7px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;transition:all .15s}
.modal-btn.confirm{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff}
.modal-btn.danger{background:var(--accent3);color:#fff}
.modal-btn.cancel{background:var(--card);color:var(--muted);border:1px solid var(--border)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadeUp .2s ease}

/* MOBILE */
@media(max-width:640px){
  .menu-btn{display:flex}
  .my-name{display:none}
  .sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:60;transform:translateX(-100%);transition:transform .25s ease;width:82vw;max-width:300px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .messages{padding:12px 12px}
  .chat-header{padding:10px 12px}
  .input-area{padding:8px 10px 12px}
  .login-box{width:92vw;padding:28px 22px}
  .login-logo{font-size:38px;letter-spacing:10px}
  .modal-box{width:90vw;padding:22px}
  .msg-img{max-width:220px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">VA<span>X</span></div>
    <div class="login-sub">// SECURE MESSENGER</div>
    <div><div class="login-label">Твій нікнейм</div>
    <input class="login-input" id="nameInput" placeholder="Введи нікнейм..." maxlength="24" autofocus></div>
    <div><div class="login-label">Кімната (необов'язково)</div>
    <input class="login-input" id="roomInput" placeholder="Загальний" maxlength="32"></div>
    <button class="login-btn" onclick="doLogin()">УВІЙТИ →</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="logo">VA<span>X</span></div>
  <div class="conn-badge" id="connBadge">ПІДКЛЮЧЕННЯ...</div>
  <div class="topbar-right">
    <span class="my-name" id="myNameTag"></span>
    <div class="my-avatar" id="myAvatar"></div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sec-label">// КІМНАТИ</div>
    <div class="room-list" id="roomList"></div>
    <button class="new-room-btn" onclick="openModal('createRoom')">＋ Нова кімната</button>
    <div class="sec-label-members">// ОСОБИСТІ</div>
    <div class="member-list" id="memberList"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="chat-header" id="chatHeader">
      <span class="ch-icon" id="chIcon">#</span>
      <div>
        <span class="ch-name" id="chName">Загальний</span>
        <span class="ch-sub" id="chSub"></span>
      </div>
      <span class="ch-count" id="chCount"><span class="ch-dot"></span><span id="chCountText">0 онлайн</span></span>
    </div>
    <div class="messages" id="messages"><div class="date-div"><span>СЬОГОДНІ</span></div></div>
    <div class="typing-bar" id="typingBar"></div>
    <div class="input-area">
      <div class="input-wrap">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Фото">📎</button>
        <input type="file" id="fileInput" accept="image/*" onchange="sendImage(this)">
        <textarea class="msg-input" id="msgInput" placeholder="Написати повідомлення..." rows="1"
          onkeydown="handleKey(event)" oninput="onTyping(this)"></textarea>
      </div>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightboxImg" src="" alt="">
</div>

<!-- MODALS -->
<div class="modal" id="createRoomModal" onclick="if(event.target===this)closeModal('createRoom')">
  <div class="modal-box">
    <div class="modal-title">НОВА КІМНАТА</div>
    <input class="modal-input" id="newRoomInput" placeholder="Назва кімнати..." maxlength="32" onkeydown="if(event.key==='Enter')confirmCreateRoom()">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('createRoom')">Скасувати</button>
      <button class="modal-btn confirm" onclick="confirmCreateRoom()">Створити</button>
    </div>
  </div>
</div>

<div class="modal" id="renameRoomModal" onclick="if(event.target===this)closeModal('renameRoom')">
  <div class="modal-box">
    <div class="modal-title">ПЕРЕЙМЕНУВАТИ</div>
    <input class="modal-input" id="renameRoomInput" placeholder="Нова назва..." maxlength="32" onkeydown="if(event.key==='Enter')confirmRenameRoom()">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('renameRoom')">Скасувати</button>
      <button class="modal-btn confirm" onclick="confirmRenameRoom()">Зберегти</button>
    </div>
  </div>
</div>

<div class="modal" id="deleteRoomModal" onclick="if(event.target===this)closeModal('deleteRoom')">
  <div class="modal-box">
    <div class="modal-title danger">ВИДАЛИТИ КІМНАТУ</div>
    <div class="modal-text">Видалити кімнату "<span id="deleteRoomName" style="color:var(--accent)"></span>"? Всі повідомлення будуть втрачені.</div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('deleteRoom')">Скасувати</button>
      <button class="modal-btn danger" onclick="confirmDeleteRoom()">Видалити</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ─────────────────────────────────────────────
let ws=null, me=null, currentRoom=null, currentDm=null; // currentDm = {id, name, color}
let typingTimeout=null, typingUsers={}, lastSender=null;
let dmTypingTimeouts={};
let dmUnread={};
let allOnlineUsers=[];
let renameTarget=null, deleteTarget=null;
let typingSent=false;

// ── LOGIN ─────────────────────────────────────────────
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('roomInput').focus()});
document.getElementById('roomInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

function doLogin(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name){document.getElementById('nameInput').style.borderColor='var(--accent3)';setTimeout(()=>document.getElementById('nameInput').style.borderColor='',800);return;}
  connect(name, document.getElementById('roomInput').value.trim()||'Загальний');
}

// ── WEBSOCKET ─────────────────────────────────────────
function connect(name, room){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>ws.send(JSON.stringify({type:'join',name,room}));
  ws.onmessage=({data})=>handle(JSON.parse(data));
  ws.onclose=()=>{document.getElementById('connBadge').textContent='ВІДКЛЮЧЕНО';document.getElementById('connBadge').className='conn-badge err';toast('Зʼєднання розірвано. Оновіть сторінку.');};
  ws.onerror=()=>toast('Помилка підключення');
}

function handle(msg){
  switch(msg.type){
    case 'init':
      me=msg.user; currentRoom=msg.room; allOnlineUsers=msg.allUsers||[];
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('connBadge').textContent='ОНЛАЙН';
      document.getElementById('connBadge').className='conn-badge ok';
      document.getElementById('myNameTag').textContent='@'+me.name;
      const av=document.getElementById('myAvatar'); av.style.background=me.color; av.textContent=initials(me.name);
      renderRooms(msg.rooms); renderMembers(); renderHistory(msg.history);
      setRoomHeader(currentRoom, false);
      updateCount(msg.members.length);
      break;
    case 'message':
      if(!currentDm) appendMsg(msg.msg);
      break;
    case 'dm_message':
      if(currentDm && currentDm.id===msg.dmWith){
        appendMsg(msg.msg);
      } else {
        // notification
        dmUnread[msg.dmWith]=(dmUnread[msg.dmWith]||0)+1;
        renderMembers();
        toast('💬 '+msg.msg.from.name+': '+(msg.msg.msgType==='image'?'[фото]':msg.msg.text.slice(0,40)));
      }
      break;
    case 'dm_history':
      renderHistory(msg.history);
      break;
    case 'user_joined':
      allOnlineUsers=msg.allUsers||allOnlineUsers;
      renderRooms(msg.rooms); renderMembers();
      if(!currentDm) updateCount(msg.members.length);
      if(msg.user.id!==me?.id&&!currentDm) appendSystem(msg.user.name+' приєднався');
      break;
    case 'user_left':
      renderRooms(msg.rooms);
      if(!currentDm) { renderMembers(); updateCount(msg.members.length); }
      delete typingUsers[msg.userId]; renderTyping();
      // remove from allOnlineUsers
      allOnlineUsers=allOnlineUsers.filter(u=>u.id!==msg.userId);
      renderMembers();
      break;
    case 'user_offline':
      allOnlineUsers=allOnlineUsers.filter(u=>u.id!==msg.userId);
      renderMembers();
      break;
    case 'room_switched':
      currentRoom=msg.room; currentDm=null;
      renderRooms(msg.rooms); renderHistory(msg.history);
      setRoomHeader(currentRoom, false); updateCount(msg.members.length);
      break;
    case 'room_renamed':
      if(currentRoom===msg.oldName){currentRoom=msg.newName;setRoomHeader(msg.newName,false);}
      renderRooms(msg.rooms);
      break;
    case 'room_deleted':
      currentRoom=msg.room||'Загальний'; currentDm=null;
      renderRooms(msg.rooms); renderHistory(msg.history);
      setRoomHeader(currentRoom,false); updateCount(msg.members.length);
      toast('Кімнату видалено, переміщено до Загального');
      break;
    case 'rooms_updated':
      renderRooms(msg.rooms);
      break;
    case 'typing':
      if(msg.userId!==me?.id&&!currentDm){
        typingUsers[msg.userId]=msg.name;
        renderTyping();
        clearTimeout(typingTimeout);
        typingTimeout=setTimeout(()=>{delete typingUsers[msg.userId];renderTyping();},2500);
      }
      break;
    case 'dm_typing':
      if(currentDm&&currentDm.id===msg.fromId){
        renderTypingDm(msg.name);
        clearTimeout(dmTypingTimeouts[msg.fromId]);
        dmTypingTimeouts[msg.fromId]=setTimeout(()=>renderTypingDm(null),2500);
      }
      break;
    case 'error': toast(msg.text); break;
  }
}

// ── RENDER ────────────────────────────────────────────
function renderRooms(rooms){
  const el=document.getElementById('roomList');
  el.innerHTML=rooms.map(r=>`
    <div class="room-item${r.name===currentRoom&&!currentDm?' active':''}" onclick="switchRoom('${esc(r.name)}')">
      <span class="room-hash">#</span>
      <span class="room-name-text">${esc(r.name)}</span>
      ${r.count>0?`<span class="room-count">${r.count}</span>`:''}
      ${!r.isDefault?`<span class="room-actions">
        <button class="room-action-btn" onclick="openRenameRoom(event,'${esc(r.name)}')" title="Перейменувати">✏️</button>
        <button class="room-action-btn del" onclick="openDeleteRoom(event,'${esc(r.name)}')" title="Видалити">🗑</button>
      </span>`:''}
    </div>`).join('');
}

function renderMembers(){
  const el=document.getElementById('memberList');
  const others=allOnlineUsers.filter(u=>u.id!==me?.id);
  if(!others.length){el.innerHTML='<div style="padding:8px 12px;font-size:11px;color:var(--dim);font-family:Share Tech Mono,monospace">нікого онлайн</div>';return;}
  el.innerHTML=others.map(u=>`
    <div class="member-item${currentDm&&currentDm.id===u.id?' active-dm':''}" onclick="openDm('${u.id}','${esc(u.name)}','${u.color}')">
      <div class="m-avatar" style="background:${u.color}">${initials(u.name)}</div>
      <span class="m-name">${esc(u.name)}</span>
      ${dmUnread[u.id]?`<span class="dm-unread">${dmUnread[u.id]}</span>`:''}
    </div>`).join('');
}

function renderHistory(history){
  const el=document.getElementById('messages');
  el.innerHTML='<div class="date-div fadein"><span>СЬОГОДНІ</span></div>';
  lastSender=null;
  history.forEach(m=>appendMsg(m,false));
  scrollBottom();
}

function appendMsg(msg, doScroll=true){
  const el=document.getElementById('messages');
  const isMe=msg.from.id===me?.id;
  const time=fmtTime(msg.time);
  const same=lastSender===msg.from.id;
  lastSender=msg.from.id;

  const div=document.createElement('div');
  div.className='msg-row fadein'+(same?' continuation':'');

  let content='';
  if(msg.msgType==='image'){
    content=`<img class="msg-img" src="${msg.imageData}" alt="фото" onclick="openLightbox('${msg.imageData}')">`;
  } else {
    content=`<div class="msg-text${isMe?' mine':''}">${linkify(esc(msg.text))}</div>`;
  }

  if(!same){
    div.innerHTML=`
      <div class="msg-av" style="background:${msg.from.color}">${initials(msg.from.name)}</div>
      <div class="msg-body">
        <div class="msg-meta"><span class="msg-name" style="color:${msg.from.color}">${esc(msg.from.name)}</span><span class="msg-time">${time}</span></div>
        ${content}
      </div>`;
  } else {
    div.innerHTML=content;
  }
  el.appendChild(div);
  if(doScroll) scrollBottom();
}

function appendSystem(text){
  const el=document.getElementById('messages');
  const d=document.createElement('div');
  d.style.cssText='text-align:center;font-family:Share Tech Mono,monospace;font-size:11px;color:var(--dim);padding:5px 0';
  d.textContent='— '+text+' —';
  el.appendChild(d); lastSender=null; scrollBottom();
}

function setRoomHeader(name, isDm, dmUser=null){
  document.getElementById('chIcon').textContent = isDm ? '🔒' : '#';
  document.getElementById('chName').textContent = isDm ? dmUser.name : name;
  document.getElementById('chSub').textContent = isDm ? 'особисті повідомлення' : '';
  const countEl=document.getElementById('chCount');
  if(isDm){countEl.innerHTML=`<span class="dm-badge">ПП</span>`;}
  else{countEl.innerHTML=`<span class="ch-dot"></span><span id="chCountText">0 онлайн</span>`;}
}

function updateCount(n){
  const el=document.getElementById('chCountText');
  if(el) el.textContent=n+' онлайн';
}

function renderTyping(){
  const bar=document.getElementById('typingBar');
  const names=Object.values(typingUsers);
  if(!names.length){bar.innerHTML='';return;}
  bar.innerHTML=`<span class="t-dots"><span></span><span></span><span></span></span> <span>${esc(names.join(', '))} друкує...</span>`;
}

function renderTypingDm(name){
  const bar=document.getElementById('typingBar');
  if(!name){bar.innerHTML='';return;}
  bar.innerHTML=`<span class="t-dots"><span></span><span></span><span></span></span> <span>${esc(name)} друкує...</span>`;
}

// ── DM ────────────────────────────────────────────────
function openDm(id, name, color){
  currentDm={id, name, color};
  dmUnread[id]=0;
  renderMembers();
  setRoomHeader(null, true, {name, color});
  document.getElementById('messages').innerHTML='<div class="date-div fadein"><span>СЬОГОДНІ</span></div>';
  lastSender=null;
  ws.send(JSON.stringify({type:'get_dm_history', toId:id}));
  closeSidebar();
  document.getElementById('msgInput').focus();
}

// ── SEND ──────────────────────────────────────────────
function sendMsg(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text||!ws||ws.readyState!==1) return;
  if(currentDm){
    ws.send(JSON.stringify({type:'dm', toId:currentDm.id, text}));
    // show own message immediately
    const msg={id:'tmp'+Date.now(),from:{id:me.id,name:me.name,color:me.color},text,time:new Date().toISOString(),msgType:'text'};
    appendMsg(msg);
  } else {
    ws.send(JSON.stringify({type:'message', text}));
  }
  input.value=''; input.style.height='';
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }

function onTyping(el){
  el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px';
  if(!typingSent&&ws&&ws.readyState===1){
    if(currentDm) ws.send(JSON.stringify({type:'dm_typing',toId:currentDm.id}));
    else ws.send(JSON.stringify({type:'typing'}));
    typingSent=true; setTimeout(()=>typingSent=false,2000);
  }
}

function sendImage(input){
  const file=input.files[0]; if(!file) return;
  if(file.size>5*1024*1024){toast('Файл занадто великий (макс 5МБ)');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const imageData=e.target.result;
    if(currentDm){
      ws.send(JSON.stringify({type:'dm_image',toId:currentDm.id,imageData}));
      const msg={id:'tmp'+Date.now(),from:{id:me.id,name:me.name,color:me.color},imageData,time:new Date().toISOString(),msgType:'image'};
      appendMsg(msg);
    } else {
      ws.send(JSON.stringify({type:'image',imageData}));
    }
  };
  reader.readAsDataURL(file);
  input.value='';
}

// ── ROOMS ─────────────────────────────────────────────
function switchRoom(name){
  currentDm=null;
  if(name===currentRoom){closeSidebar();return;}
  ws.send(JSON.stringify({type:'switch_room',room:name}));
  closeSidebar();
}

function openRenameRoom(e, name){ e.stopPropagation(); renameTarget=name; document.getElementById('renameRoomInput').value=name; openModal('renameRoom'); }
function openDeleteRoom(e, name){ e.stopPropagation(); deleteTarget=name; document.getElementById('deleteRoomName').textContent=name; openModal('deleteRoom'); }

function confirmCreateRoom(){
  const name=document.getElementById('newRoomInput').value.trim(); if(!name) return;
  ws.send(JSON.stringify({type:'create_room',name})); closeModal('createRoom');
  setTimeout(()=>switchRoom(name),300);
}

function confirmRenameRoom(){
  const newName=document.getElementById('renameRoomInput').value.trim(); if(!newName||!renameTarget) return;
  ws.send(JSON.stringify({type:'rename_room',oldName:renameTarget,newName})); closeModal('renameRoom'); renameTarget=null;
}

function confirmDeleteRoom(){
  if(!deleteTarget) return;
  ws.send(JSON.stringify({type:'delete_room',name:deleteTarget})); closeModal('deleteRoom'); deleteTarget=null;
}

// ── SIDEBAR ───────────────────────────────────────────
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

// ── MODAL ─────────────────────────────────────────────
function openModal(name){
  document.getElementById(name+'Modal').classList.add('open');
  setTimeout(()=>{
    const inp=document.getElementById(name+'Modal').querySelector('.modal-input');
    if(inp) inp.focus();
  },50);
}
function closeModal(name){
  document.getElementById(name+'Modal').classList.remove('open');
  const inp=document.getElementById(name+'Modal').querySelector('.modal-input');
  if(inp&&name==='createRoom') inp.value='';
}

// ── LIGHTBOX ──────────────────────────────────────────
function openLightbox(src){ document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').classList.add('open'); }

// ── UTILS ─────────────────────────────────────────────
function initials(n){ return String(n).slice(0,2).toUpperCase(); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollBottom(){ const e=document.getElementById('messages'); e.scrollTop=e.scrollHeight; }
function fmtTime(iso){ try{return new Date(iso).toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});}catch{return '';} }
function linkify(s){ return s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">$1</a>'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
</script>
</body>
</html>
